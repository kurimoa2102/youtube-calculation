<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom Video Player</title>
    <style>
        body { font-family: sans-serif; line-height: 1.6; margin: 20px; background-color: #f4f4f4; color: #333; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .main-content { display: flex; gap: 20px; flex-wrap: wrap; }
        .player-and-search { flex-grow: 1; min-width: 300px; }
        h1, h2 { text-align: center; }
        h2 { border-bottom: 2px solid #007bff; padding-bottom: 5px; margin-top: 30px; }
        
        .input-group { display: flex; gap: 10px; margin-bottom: 20px; }
        .input-group input { flex-grow: 1; padding: 10px; font-size: 16px; border: 1px solid #ccc; border-radius: 4px; }
        .input-group button { padding: 10px 20px; font-size: 16px; cursor: pointer; color: white; border: none; border-radius: 4px; background-color: #c4302b; }
        
        /* ビデオプレイヤーの枠 */
        .video-wrapper { position: relative; width: 100%; padding-top: 56.25%; background-color: #000; border-radius: 8px; overflow: hidden; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        #mainPlayer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; background: #000; }
        
        /* 履歴・サイドバー */
        .sidebar { width: 320px; flex-shrink: 0; }
        #historyList { list-style: none; padding: 0; max-height: 400px; overflow-y: auto; border: 1px solid #eee; border-radius: 4px; background: #fff; }
        #historyList li { display: flex; align-items: center; padding: 8px; border-bottom: 1px solid #eee; cursor: pointer; position: relative; }
        .thumbnail { width: 100px; height: 56.25px; margin-right: 12px; border-radius: 4px; object-fit: cover; flex-shrink: 0; }
        .title { flex-grow: 1; font-size: 14px; margin-right: 30px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .pin-button { position: absolute; top: 50%; right: 8px; transform: translateY(-50%); background: none; border: none; cursor: pointer; font-size: 20px; color: #ccc; }
        .pin-button.pinned { color: #f0a000; }
        li.pinned-item { background-color: #fffbef !important; }
        
        /* おすすめ */
        #ai-recommendations { background: #e3f2fd; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        .ai-video-btn { display: block; width: 100%; background: #fff; border: 1px solid #0288d1; color: #0288d1; padding: 8px 12px; margin-bottom: 8px; border-radius: 4px; cursor: pointer; font-size: 13px; text-align: left; }
    </style>
</head>
<body>
    <div class="container">
        <h1>googlevideo Custom Player</h1>
        <div class="main-content">
            <div class="player-and-search">
                <div id="search-container">
                    <script async src="https://cse.google.com/cse.js?cx=d02f1e46ace6b4d88"></script>
                    <div class="gcse-search"></div>
                </div>
                <div class="input-group" style="margin-top:15px;">
                    <input type="text" id="youtubeUrl" placeholder="URLを貼り付けるか、上で検索">
                    <button id="playButton">再生</button>
                </div>
                
                <div class="video-wrapper">
                    <!-- 自動再生のために muted, playsinline を追加 -->
                    <video id="mainPlayer" controls autoplay muted playsinline poster=""></video>
                </div>
                <p id="statusMessage" style="text-align:center; font-size:14px; color:#c4302b; font-weight:bold;"></p>
                <p style="text-align:center; font-size:12px; color:#666;">※ブラウザの制限により、最初は音が出ない設定(ミュート)で始まります。<br>動画のスピーカーアイコンを押して音を出してください。</p>
            </div>

            <div class="sidebar">
                <div id="ai-recommendations" style="display:none;">
                    <h3>✨ Geminiのおすすめ</h3>
                    <div id="ai-videos"></div>
                </div>
                <h3>視聴履歴 📌</h3>
                <ul id="historyList"></ul>
            </div>
        </div>
    </div>

    <script>
        // ▼▼▼ APIキー（AQ...）を貼り付け ▼▼▼
        const GEMINI_API_KEY = "AQ.Ab8RN6JbKiJp30cKbyVYqfyij4GxdktlPbl8E433piW-emg56A";

        const urlInput = document.getElementById('youtubeUrl');
        const playButton = document.getElementById('playButton');
        const mainPlayer = document.getElementById('mainPlayer');
        const statusMessage = document.getElementById('statusMessage');
        const historyList = document.getElementById('historyList');
        const HISTORY_KEY = 'gvPlayerHistoryV2';

        // 検索結果クリック
        document.getElementById('search-container').addEventListener('click', (event) => {
            const link = event.target.closest('a.gs-title');
            if (!link) return;
            event.preventDefault();
            urlInput.value = link.href;
            playVideo();
        });

        // 再生処理
        async function playVideo() {
            let url = urlInput.value.trim();
            statusMessage.textContent = "読み込み中...";
            
            if (url.includes('google.com/url?')) {
                const params = new URLSearchParams(url.split('?')[1]);
                url = params.get('q') || url;
            }

            const videoId = extractVideoId(url);
            if (!videoId) {
                statusMessage.textContent = "有効なURLを入力してください。";
                return;
            }

            // googlevideoへのリダイレクトURL。複数のインスタンスをランダムに試すとより安定します。
            const streamUrl = `https://iv.ggtyler.dev/latest_version?id=${videoId}&itag=18`;
            
            mainPlayer.src = streamUrl;
            mainPlayer.load();

            // 再生実行
            try {
                // ブラウザへの「ユーザーの意思」を伝えるため、少し遅延させてplayを実行
                await mainPlayer.play();
                statusMessage.textContent = "再生中 (ミュート解除してご覧ください)";
            } catch (e) {
                console.error("Autoplay failed:", e);
                statusMessage.textContent = "ブロックされました。プレイヤーの再生ボタンを押してください。";
            }

            // 履歴とAI
            fetch(`https://noembed.com/embed?url=https://www.youtube.com/watch?v=${videoId}`)
                .then(res => res.json())
                .then(data => {
                    addToHistory(videoId, data.title, data.thumbnail_url);
                    getGeminiRecommendations(videoId, data.title);
                }).catch(() => addToHistory(videoId, `ID: ${videoId}`, ''));
        }

        function extractVideoId(url) {
            const regex = /(?:youtube\.com\/(?:[^\/]+\/.+\/|(?:v|e(?:mbed)?)\/|.*[?&]v=)|youtu\.be\/)([^"&?\/\s]{11})/;
            const match = url.match(regex);
            return match ? match[1] : null;
        }

        // Gemini AI (URL推論)
        async function getGeminiRecommendations(id, title) {
            if (!GEMINI_API_KEY) return;
            const aiArea = document.getElementById('ai-recommendations');
            const videosArea = document.getElementById('ai-videos');
            aiArea.style.display = 'block';
            videosArea.innerHTML = 'AIが考え中...';

            const prompt = `YouTube動画「${title}」の関連動画を2つ提案して。JSON形式[{"title":"タイトル","url":"https://www.youtube.com/watch?v=ID"}]のみ出力。`;
            
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });
                const data = await response.json();
                const text = data.candidates[0].content.parts[0].text;
                const recs = JSON.parse(text.replace(/```json/g, '').replace(/```/g, '').trim());
                
                videosArea.innerHTML = '';
                recs.forEach(r => {
                    const btn = document.createElement('button');
                    btn.className = 'ai-video-btn';
                    btn.innerHTML = `🎥 ${r.title}`;
                    btn.onclick = () => { urlInput.value = r.url; playVideo(); };
                    videosArea.appendChild(btn);
                });
            } catch (e) { videosArea.innerHTML = '読み込み失敗'; }
        }

        // 履歴管理
        function getHistory() { return JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]'); }
        function saveHistory(history) { localStorage.setItem(HISTORY_KEY, JSON.stringify(history)); }
        function addToHistory(id, title, thumb) {
            let h = getHistory();
            const exist = h.find(item => item.id === id);
            const pinned = exist ? exist.pinned : false;
            h = h.filter(i => i.id !== id);
            h.unshift({ id, title, thumb, pinned });
            if (h.length > 100) h.pop();
            saveHistory(h);
            renderHistory();
        }
        function togglePin(id) {
            let h = getHistory();
            const i = h.find(item => item.id === id);
            if (i) { i.pinned = !i.pinned; saveHistory(h); renderHistory(); }
        }
        function renderHistory() {
            const h = getHistory();
            historyList.innerHTML = h.length ? '' : '<li>履歴なし</li>';
            [...h.filter(i => i.pinned), ...h.filter(i => !i.pinned)].forEach(i => {
                const li = document.createElement('li');
                if (i.pinned) li.classList.add('pinned-item');
                li.innerHTML = `
                    <img src="${i.thumb}" class="thumbnail">
                    <span class="title">${i.title}</span>
                    <button class="pin-button ${i.pinned ? 'pinned' : ''}">📌</button>
                `;
                li.onclick = (e) => {
                    if (e.target.classList.contains('pin-button')) togglePin(i.id);
                    else { urlInput.value = `https://www.youtube.com/watch?v=${i.id}`; playVideo(); }
                };
                historyList.appendChild(li);
            });
        }

        playButton.onclick = playVideo;
        document.addEventListener('DOMContentLoaded', renderHistory);
    </script>
</body>
</html>
