<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom Video Player with Gemini</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; line-height: 1.6; margin: 20px; background-color: #f4f4f4; color: #333; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .main-content { display: flex; gap: 20px; align-items: flex-start; flex-wrap: wrap; }
        .player-and-search { flex-grow: 1; min-width: 300px; }
        h1, h2 { text-align: center; }
        h2 { border-bottom: 2px solid #007bff; padding-bottom: 5px; margin-top: 30px; }
        
        .input-group { display: flex; gap: 10px; margin-bottom: 20px; }
        .input-group input { flex-grow: 1; padding: 10px; font-size: 16px; border: 1px solid #ccc; border-radius: 4px; }
        .input-group button { padding: 10px 20px; font-size: 16px; cursor: pointer; color: white; border: none; border-radius: 4px; background-color: #c4302b; }
        
        /* 完全に自前のプレイヤーエリア */
        .video-wrapper { position: relative; width: 100%; padding-top: 56.25%; background-color: #000; border-radius: 8px; overflow: hidden; margin-bottom: 20px; border: 1px solid #333; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .loading-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: white; font-size: 16px; z-index: 5; text-align: center;}
        
        .sidebar { width: 320px; flex-shrink: 0; }
        .sidebar h3 { text-align: center; margin-top: 0; }
        .history-header { display: flex; justify-content: space-between; align-items: center; }
        #clearHistoryButton { padding: 5px 10px; font-size: 12px; background-color: #6c757d; cursor: pointer; border-radius: 4px; color: white; border: none; }
        #historyList { list-style: none; padding: 0; max-height: 400px; overflow-y: auto; border: 1px solid #eee; border-radius: 4px; background: #fff; }
        #historyList li { display: flex; align-items: center; padding: 8px; border-bottom: 1px solid #eee; cursor: pointer; position: relative; }
        #historyList li:hover { background-color: #f0f0f0; }
        .thumbnail { width: 100px; height: 56.25px; margin-right: 12px; border-radius: 4px; object-fit: cover; background-color: #e0e0e0; flex-shrink: 0; }
        .title { flex-grow: 1; font-size: 14px; margin-right: 30px; }
        .pin-button { position: absolute; top: 50%; right: 8px; transform: translateY(-50%); background: none; border: none; cursor: pointer; font-size: 20px; color: #ccc; padding: 5px; }
        .pin-button:hover { color: #f0c040; }
        .pin-button.pinned { color: #f0a000; }
        li.pinned-item { background-color: #fffbef !important; }
        
        #ai-recommendations { background: #e3f2fd; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        #ai-recommendations h3 { margin-top: 0; font-size: 16px; color: #0277bd; }
        .ai-video-btn { display: block; width: 100%; background: #fff; border: 1px solid #0288d1; color: #0288d1; padding: 8px 12px; margin-bottom: 8px; border-radius: 4px; cursor: pointer; font-size: 13px; text-align: left; transition: 0.2s; }
        .ai-video-btn:hover { background: #0288d1; color: #fff; }
        .ai-video-title { font-weight: bold; margin-bottom: 4px; display: block; }
        .ai-video-url { font-size: 11px; opacity: 0.8; word-break: break-all; display: block; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Custom Video Player</h1>
        <div class="main-content">
            <div class="player-and-search">
                <h2>1. 動画を検索・再生</h2>
                <div id="search-container">
                    <script async src="https://cse.google.com/cse.js?cx=d02f1e46ace6b4d88"></script>
                    <div class="gcse-search"></div>
                </div>
                <div class="input-group">
                    <input type="text" id="youtubeUrl" placeholder="URLを貼り付けるか、上で検索してクリック">
                    <button id="playButton">表示</button>
                </div>
                
                <div class="video-wrapper" id="videoContainer">
                    <div class="loading-text" id="loadingText" style="display:none;">動画ストリームを抽出中...</div>
                </div>
                <p id="errorMessage" style="color:red; text-align:center; font-weight:bold;"></p>
            </div>

            <div class="sidebar">
                <div id="ai-recommendations" style="display:none;">
                    <h3>✨ Geminiのおすすめ動画</h3>
                    <div id="ai-videos"></div>
                </div>

                <div class="history-header">
                    <h3>視聴履歴 📌</h3>
                    <button id="clearHistoryButton">履歴消去</button>
                </div>
                <ul id="historyList"></ul>
            </div>
        </div>
    </div>

    <script>
        // ▼▼▼ APIキーを " " の間に貼り付けてください。 " を消さないでください！ ▼▼▼
        const GEMINI_API_KEY = "AQ.Ab8RN6JbKiJp30cKbyVYqfyij4GxdktlPbl8E433piW-emg56A";
        // ▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲

        const urlInput = document.getElementById('youtubeUrl');
        const playButton = document.getElementById('playButton');
        const videoContainer = document.getElementById('videoContainer');
        const errorMessage = document.getElementById('errorMessage');
        const historyList = document.getElementById('historyList');
        const HISTORY_KEY = 'customPlayerHistory';

        // Google検索結果のクリックを強制横取り
        document.getElementById('search-container').addEventListener('click', (event) => {
            const link = event.target.closest('a');
            if (!link || !link.classList.contains('gs-title')) return;
            event.preventDefault();
            event.stopImmediatePropagation();
            const url = link.getAttribute('data-ctorig') || link.href;
            if (url) {
                urlInput.value = url;
                playVideo();
            }
        }, true);

        // ==========================================
        // ★ CORSエラー対策版：生ストリームURLの抽出
        // ==========================================
        async function getRawVideoUrl(videoId) {
            // Vercel上のCORSエラーを回避するため、alloriginsプロキシを経由する
            const proxyBase = 'https://api.allorigins.win/raw?url=';
            const apis = [
                'https://pipedapi.kavin.rocks',
                'https://pipedapi.tokhmi.xyz',
                'https://pipedapi.smnz.de'
            ];
            
            for (const api of apis) {
                try {
                    const targetUrl = encodeURIComponent(`${api}/streams/${videoId}`);
                    const response = await fetch(proxyBase + targetUrl);
                    if (!response.ok) continue;
                    
                    const data = await response.json();
                    let stream = data.videoStreams.find(s => s.videoOnly === false && s.mimeType.includes('mp4'));
                    if (stream && stream.url) return stream.url;
                } catch (e) { 
                    console.warn(`API抽出に失敗しました。次を試します...`);
                }
            }
            throw new Error("動画の抽出に失敗しました。時間をおいて試してください。");
        }

        // ==========================================
        // 動画再生メイン（普通のYouTubeを完全排除）
        // ==========================================
        async function playVideo() {
            let urlToProcess = urlInput.value.trim();
            errorMessage.textContent = '';
            document.getElementById('ai-recommendations').style.display = 'none';
            videoContainer.innerHTML = '<div class="loading-text">動画データを抽出中...<br>（数秒かかります）</div>';
            
            if (urlToProcess.includes('google.com/url?')) {
                const params = new URLSearchParams(urlToProcess.split('?')[1]);
                urlToProcess = params.get('q') || urlToProcess;
            }

            const videoId = extractVideoId(urlToProcess);
            if (!videoId) {
                errorMessage.textContent = '有効なURLを入力してください。';
                videoContainer.innerHTML = '';
                return;
            }

            videoContainer.scrollIntoView({ behavior: 'smooth', block: 'center' });
            const currentVideoUrl = `https://www.youtube.com/watch?v=${videoId}`;

            try {
                // 1. 生のURL抽出を試みる（プロキシ経由）
                const rawUrl = await getRawVideoUrl(videoId);
                
                // 2. 完全に自前のクリーンなプレイヤーで再生！
                videoContainer.innerHTML = `
                    <video id="mainPlayer" controls autoplay style="position:absolute; top:0; left:0; width:100%; height:100%; z-index:10; background:#000;">
                        <source src="${rawUrl}" type="video/mp4">
                    </video>
                `;

                // 3. 履歴とGemini処理 (CORS回避のためプロキシ使用)
                const embedRes = await fetch(`https://api.allorigins.win/raw?url=${encodeURIComponent('https://noembed.com/embed?url=' + currentVideoUrl)}`);
                const data = await embedRes.json();
                
                if (data.title) {
                    addToHistory(videoId, data.title, data.thumbnail_url);
                    getGeminiRecommendations(currentVideoUrl, data.title);
                } else {
                    addToHistory(videoId, `動画ID: ${videoId}`, '');
                }

            } catch (error) {
                errorMessage.textContent = error.message;
                videoContainer.innerHTML = '';
            }
        }

        function extractVideoId(url) {
            const regex = /(?:youtube\.com\/(?:[^\/]+\/.+\/|(?:v|e(?:mbed)?)\/|.*[?&]v=)|youtu\.be\/)([^"&?\/\s]{11})/;
            const match = url.match(regex);
            return match ? match[1] : null;
        }

        // ==========================================
        // Gemini API おすすめ動画
        // ==========================================
        async function getGeminiRecommendations(videoUrl, videoTitle) {
            const apiKey = GEMINI_API_KEY.trim();
            if (!apiKey || apiKey.includes('ここに')) return;

            const aiArea = document.getElementById('ai-recommendations');
            const videosArea = document.getElementById('ai-videos');
            aiArea.style.display = 'block';
            videosArea.innerHTML = '<span style="font-size:13px; color:#555;">AIが関連動画を探しています...</span>';

            const prompt = `
ユーザーは今、以下のYouTube動画を見ています。
タイトル: ${videoTitle}
URL: ${videoUrl}

この動画の投稿者が出している他の動画や、内容が似ている最近の動画を3つ提案してください。
出力は必ず、JavaScriptで解析できる以下のJSON形式の文字列のみを出力してください。
[
  {"title": "おすすめ動画のタイトル1", "url": "https://www.youtube.com/watch?v=推測した動画ID1"},
  {"title": "おすすめ動画のタイトル2", "url": "https://www.youtube.com/watch?v=推測した動画ID2"}
]
`;
            try {
                // モデル指定を安定版の gemini-1.5-flash-latest に変更
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash-latest:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });

                if (!response.ok) throw new Error("Gemini API Error");

                const data = await response.json();
                let resultText = data.candidates[0].content.parts[0].text;
                resultText = resultText.replace(/```json/g, '').replace(/```/g, '').trim();
                const recommendations = JSON.parse(resultText);
                
                videosArea.innerHTML = '';
                recommendations.forEach(rec => {
                    const btn = document.createElement('button');
                    btn.className = 'ai-video-btn';
                    btn.innerHTML = `<span class="ai-video-title">🎥 ${rec.title}</span><span class="ai-video-url">${rec.url}</span>`;
                    btn.onclick = () => { urlInput.value = rec.url; playVideo(); };
                    videosArea.appendChild(btn);
                });
            } catch (error) {
                videosArea.innerHTML = '<span style="font-size:13px; color:red;">おすすめの取得に失敗しました。</span>';
            }
        }

        // ==========================================
        // 履歴・ピン留め機能
        // ==========================================
        function getHistory() { return JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]'); }
        function saveHistory(history) { localStorage.setItem(HISTORY_KEY, JSON.stringify(history)); }
        
        function addToHistory(videoId, title, thumb) {
            let history = getHistory();
            const existing = history.find(i => i.id === videoId);
            const isPinned = existing ? existing.pinned : false;
            history = history.filter(i => i.id !== videoId);
            history.unshift({ id: videoId, title, thumb, pinned: isPinned });
            if (history.length > 100) history.pop();
            saveHistory(history);
            renderHistory();
        }

        function togglePin(videoId) {
            let history = getHistory();
            const item = history.find(i => i.id === videoId);
            if (item) { item.pinned = !item.pinned; saveHistory(history); renderHistory(); }
        }

        function renderHistory() {
            const history = getHistory();
            const pinnedItems = history.filter(i => i.pinned);
            const normalItems = history.filter(i => !i.pinned);
            historyList.innerHTML = '';
            
            if (history.length === 0) {
                historyList.innerHTML = '<li style="padding:15px; color:#888; text-align:center;">視聴履歴はありません</li>';
                return;
            }
            
            [...pinnedItems, ...normalItems].forEach(item => {
                const li = document.createElement('li');
                if (item.pinned) li.classList.add('pinned-item');
                li.innerHTML = `
                    <img src="${item.thumb || 'https://via.placeholder.com/100x56.png?text=No+Image'}" class="thumbnail">
                    <span class="title">${item.title}</span>
                    <button class="pin-button ${item.pinned ? 'pinned' : ''}">📌</button>
                `;
                li.onclick = (e) => {
                    if (e.target.classList.contains('pin-button')) { togglePin(item.id); } 
                    else { urlInput.value = `https://www.youtube.com/watch?v=${item.id}`; playVideo(); }
                };
                historyList.appendChild(li);
            });
        }

        document.getElementById('clearHistoryButton').onclick = () => {
            if (confirm('視聴履歴をすべて消去しますか？')) { localStorage.removeItem(HISTORY_KEY); renderHistory(); }
        };

        playButton.onclick = playVideo;
        urlInput.onkeypress = e => e.key === 'Enter' && playVideo();
        document.addEventListener('DOMContentLoaded', renderHistory);
    </script>
</body>
</html>
